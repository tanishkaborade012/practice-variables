name: Secret demo
on: 
  push:
    branches:
      - main

jobs:
  show-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Use Secret 
        run: echo "Password is ${{secrets.MY_PASSWORD}}" 

  show-context:
    runs-on: ubuntu-latest
    steps:
      - name: git context
        run: |
          echo "Actor: ${{github.actor}}"
          echo "branch: ${{github.ref}}"
          echo "Repo: ${{github.repository}}"
          echo "Runnere: ${{runner.os}}"
          echo "${{toJson(github)}}"
  
